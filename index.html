<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Átomo 3D PRO</title>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #111, #000);
      font-family: Arial;
      color: white;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 12px;
      width: 240px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    #info {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.9;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<div id="ui">
  <h3>⚛ Átomo PRO</h3>

  <select id="element"></select>

  <div id="info"></div>
</div>

<script>
/* =========================
   DATOS
========================= */
const elements = {
  H:  { name:"Hidrógeno", protons:1, neutrons:0, shells:[1] },
  He: { name:"Helio", protons:2, neutrons:2, shells:[2] },
  C:  { name:"Carbono", protons:6, neutrons:6, shells:[2,4] },
  O:  { name:"Oxígeno", protons:8, neutrons:8, shells:[2,6] },
  Ne: { name:"Neón", protons:10, neutrons:10, shells:[2,8] }
};

/* =========================
   ESCENA
========================= */
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
  60, window.innerWidth/window.innerHeight, 0.1, 1000
);
camera.position.set(0, 10, 40);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ORBIT CONTROLS */
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* =========================
   LUZ
========================= */
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(20,20,20);
scene.add(light);

/* =========================
   VARIABLES
========================= */
let nucleusGroup;
let electronGroup;
let electrons = [];

/* =========================
   NÚCLEO
========================= */
function createNucleus(p, n){
  const group = new THREE.Group();

  const protonMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  const neutronMat = new THREE.MeshBasicMaterial({ color: 0x888888 });

  function add(count, mat){
    for(let i=0;i<count;i++){
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.8,16,16),
        mat
      );

      mesh.position.set(
        (Math.random()-0.5)*3,
        (Math.random()-0.5)*3,
        (Math.random()-0.5)*3
      );

      group.add(mesh);
    }
  }

  add(p, protonMat);
  add(n, neutronMat);

  return group;
}

/* =========================
   ELECTRONES PRO (ÓRBITAS)
========================= */
function createElectrons(shells){
  const group = new THREE.Group();
  electrons = [];

  shells.forEach((count, layer)=>{
    const radius = (layer+1)*6;

    for(let i=0;i<count;i++){
      const angle = (i / count) * Math.PI * 2;

      const e = new THREE.Mesh(
        new THREE.SphereGeometry(0.3,12,12),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
      );

      e.userData = {
        radius,
        angle,
        speed: 0.02 + layer*0.01
      };

      group.add(e);
      electrons.push(e);
    }
  });

  return group;
}

/* =========================
   ANIMACIÓN ELECTRONES
========================= */
function animateElectrons(){
  electrons.forEach(e=>{
    e.userData.angle += e.userData.speed;

    e.position.x = Math.cos(e.userData.angle)*e.userData.radius;
    e.position.z = Math.sin(e.userData.angle)*e.userData.radius;
  });
}

/* =========================
   CARGAR ÁTOMO
========================= */
function loadAtom(key){
  const el = elements[key];

  document.getElementById("info").innerHTML = `
    <b>${el.name}</b><br>
    Protones: ${el.protons}<br>
    Neutrones: ${el.neutrons}<br>
    Capas: ${el.shells}
  `;

  if(nucleusGroup) scene.remove(nucleusGroup);
  if(electronGroup) scene.remove(electronGroup);

  nucleusGroup = createNucleus(el.protons, el.neutrons);
  electronGroup = createElectrons(el.shells);

  scene.add(nucleusGroup);
  scene.add(electronGroup);
}

/* =========================
   UI
========================= */
const select = document.getElementById("element");

Object.keys(elements).forEach(k=>{
  const opt = document.createElement("option");
  opt.value = k;
  opt.textContent = elements[k].name;
  select.appendChild(opt);
});

select.addEventListener("change", e=>{
  loadAtom(e.target.value);
});

/* =========================
   RESIZE
========================= */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =========================
   LOOP
========================= */
function animate(){
  requestAnimationFrame(animate);

  animateElectrons();
  controls.update();

  renderer.render(scene,camera);
}

/* START */
loadAtom("H");
animate();

</script>

</body>
</html>
