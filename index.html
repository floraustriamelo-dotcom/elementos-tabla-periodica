<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Átomos 3D</title> 

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #111, #000);
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      width: 220px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    #info {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div id="ui">
    <h2>⚛ Simulador Atómico</h2>
    <select id="elementSelect"></select>
    <div id="info"></div>
  </div>

  <div id="container"></div>

  <script>
    const elements = {
      H: { name: "Hidrógeno", protons: 1, neutrons: 0, shells: [1] },
      He: { name: "Helio", protons: 2, neutrons: 2, shells: [2] },
      Li: { name: "Litio", protons: 3, neutrons: 4, shells: [2,1] },
      Be: { name: "Berilio", protons: 4, neutrons: 5, shells: [2,2] },
      B: { name: "Boro", protons: 5, neutrons: 6, shells: [2,3] },
      C: { name: "Carbono", protons: 6, neutrons: 6, shells: [2,4] },
      N: { name: "Nitrógeno", protons: 7, neutrons: 7, shells: [2,5] },
      O: { name: "Oxígeno", protons: 8, neutrons: 8, shells: [2,6] },
      F: { name: "Flúor", protons: 9, neutrons: 10, shells: [2,7] },
      Ne: { name: "Neón", protons: 10, neutrons: 10, shells: [2,8] }
    };

    let scene, camera, renderer;
    let nucleusGroup, electronGroup;
    let electrons = [];
    let currentElement = "H";

    init();
    animate();
    loadUI();
    loadElement(currentElement);

    function init(){
      const container = document.getElementById("container");

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
      );

      camera.position.z = 40;

      renderer = new THREE.WebGLRenderer({ antialias:true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function createNucleus(protons, neutrons){
      const group = new THREE.Group();

      const protonMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
      const neutronMat = new THREE.MeshBasicMaterial({ color: 0x888888 });

      for(let i=0;i<protons;i++){
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.6),
          protonMat
        );

        mesh.position.set(
          (Math.random()-0.5)*4,
          (Math.random()-0.5)*4,
          (Math.random()-0.5)*4
        );

        group.add(mesh);
      }

      for(let i=0;i<neutrons;i++){
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.6),
          neutronMat
        );

        mesh.position.set(
          (Math.random()-0.5)*4,
          (Math.random()-0.5)*4,
          (Math.random()-0.5)*4
        );

        group.add(mesh);
      }

      return group;
    }

    function createElectrons(shells){
      const group = new THREE.Group();
      electrons = [];

      shells.forEach((count, index) => {
        const radius = (index + 1) * 5;

        for(let i=0;i<count;i++){
          const angle = (i / count) * Math.PI * 2;

          const electron = new THREE.Mesh(
            new THREE.SphereGeometry(0.3),
            new THREE.MeshBasicMaterial({ color: 0x00ffff })
          );

          electron.userData = {
            radius,
            angle,
            speed: 0.02 + index * 0.01
          };

          group.add(electron);
          electrons.push(electron);
        }
      });

      return group;
    }

    function updateElectrons(){
      electrons.forEach(e => {
        e.userData.angle += e.userData.speed;

        e.position.x = Math.cos(e.userData.angle) * e.userData.radius;
        e.position.z = Math.sin(e.userData.angle) * e.userData.radius;
      });
    }

    function loadElement(symbol){
      const el = elements[symbol];

      document.getElementById("info").innerHTML = `
        <b>${el.name}</b><br>
        Protones: ${el.protons}<br>
        Neutrones: ${el.neutrons}<br>
        Electrones: ${el.shells}
      `;

      if(nucleusGroup) scene.remove(nucleusGroup);
      if(electronGroup) scene.remove(electronGroup);

      nucleusGroup = createNucleus(el.protons, el.neutrons);
      electronGroup = createElectrons(el.shells);

      scene.add(nucleusGroup);
      scene.add(electronGroup);
    }

    function loadUI(){
      const select = document.getElementById("elementSelect");

      Object.keys(elements).forEach(key => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = elements[key].name;
        select.appendChild(opt);
      });

      select.addEventListener("change", (e) => {
        currentElement = e.target.value;
        loadElement(currentElement);
      });
    }

    function animate(){
      requestAnimationFrame(animate);
      updateElectrons();
      renderer.render(scene, camera);
    }
  </script>

</body>
</html>
